name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck (errors gate)
        run: shellcheck --severity=error scripts/*.sh tests/*.sh

      - name: ShellCheck (warnings, advisory)
        run: shellcheck --severity=warning scripts/*.sh tests/*.sh || true

      - name: Python compile
        run: python3 -m py_compile scripts/measure-session.py

      - name: Validate JSON manifests
        run: |
          python3 - <<'PY'
          import json
          for p in ("package.json", ".omp-plugin/marketplace.json", "prices.json",
                    "hooks/policy-context.json"):
              json.load(open(p))
              print("ok", p)
          PY

      - name: Tests (stubs agy; no network)
        run: bash tests/run-tests.sh
